<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>PC Connect - 悬浮窗</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://localhost:3456 ws://127.0.0.1:3456" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: transparent; overflow: hidden; -webkit-app-region: drag; }
      .float-bar { display: flex; align-items: center; gap: 6px; padding: 10px 14px; background: rgba(0,0,0,0.85); border-radius: 12px; backdrop-filter: blur(10px); }
      .float-btn { width: 36px; height: 36px; border: none; border-radius: 50%; cursor: pointer; color: #fff; font-size: 14px; -webkit-app-region: no-drag; display: flex; align-items: center; justify-content: center; }
      .float-btn.mic { background: #2ecc71; } .float-btn.mic.off { background: #e74c3c; }
      .float-btn.end { background: #e74c3c; }
      .float-btn.restore { background: #3498db; }
    </style>
  </head>
  <body>
    <div class="float-bar">
      <button class="float-btn mic" id="micBtn" title="麦克风"><span id="micIcon">🎤</span></button>
      <button class="float-btn restore" id="restoreBtn" title="恢复主窗口">📂</button>
      <button class="float-btn end" id="endBtn" title="结束共享">✕</button>
    </div>
    <script>
      const { ipcRenderer } = require('electron')
      document.getElementById('micBtn').onclick = () => {
        const btn = document.getElementById('micBtn')
        const icon = document.getElementById('micIcon')
        btn.classList.toggle('off')
        icon.textContent = btn.classList.contains('off') ? '🔇' : '🎤'
        ipcRenderer.send('floating-mic-toggle')
      }
      document.getElementById('restoreBtn').onclick = () => ipcRenderer.send('floating-restore')
      document.getElementById('endBtn').onclick = () => ipcRenderer.send('floating-end')
    </script>
  </body>
</html>
